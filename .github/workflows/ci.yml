name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: read

jobs:
  python-ci:
    name: Python CI
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check forbidden repository content
        run: |
          python - <<'PY'
          from pathlib import Path

          forbidden_suffixes = {
              ".sqlite", ".sqlite3", ".db", ".dump", ".backup", ".vector", ".faiss", ".index"
          }
          forbidden_dirs = {"secrets", "evidence", "exports", "backups", "pgdata", ".local"}

          failures = []
          for path in Path(".").rglob("*"):
              parts = set(path.parts)
              if ".git" in parts:
                  continue
              if any(part in forbidden_dirs for part in parts):
                  failures.append(str(path))
              if path.suffix.lower() in forbidden_suffixes:
                  failures.append(str(path))

          if failures:
              print("Forbidden files or paths found:")
              for item in failures:
                  print(item)
              raise SystemExit(1)
          PY

      - name: Ruff lint
        run: ruff check src tests

      - name: Ruff format check
        run: ruff format --check src tests

      - name: Mypy
        run: mypy src/clecmas

      - name: Pytest
        run: pytest

      - name: Dependency audit
        run: pip-audit

      - name: License inventory
        run: pip-licenses --format=markdown --with-license-file --output-file license-inventory.md

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Dependency review
        uses: actions/dependency-review-action@v4
